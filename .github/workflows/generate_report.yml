name: パッシブ住宅効果レポート生成

on:
  push:
    branches: [main, master, claude/passive-housing-effects-viz-qUuRm]
    paths:
      - '地点データ/**'
      - 'generate_report.py'
      - '.github/workflows/generate_report.yml'
  workflow_dispatch:     # 手動実行も可能

permissions:
  contents: write        # docs/ への commit に必要

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install pandas numpy plotly kaleido

      - name: レポート生成スクリプトを実行
        run: python generate_report.py

      - name: 生成ファイルを確認
        run: |
          echo "=== 生成されたファイル ==="
          ls -lh docs/
          echo ""
          echo "=== passive_summary.csv ==="
          cat docs/passive_summary.csv

      - name: docs/ を Git にコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "変更なし、スキップ" || (
            git commit -m "docs: パッシブ住宅効果レポートを自動生成 [skip ci]"
            git push
          )
